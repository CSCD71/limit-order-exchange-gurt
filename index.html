<!doctype html>
<!-- UI built with the assistance of AI tools -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GurtEX</title>
    <link rel="stylesheet" href="static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">Gurt</div>
        <div class="brand-text">
          <h1>GurtEX</h1>
        </div>
      </div>
      <div class="wallet">
        <div class="wallet-row">
          <select id="networkSelect" class="select"></select>
          <button id="connectButton" class="btn">Connect Wallet</button>
        </div>
        <div id="walletStatus" class="status" aria-live="polite"></div>
      </div>
    </header>

    <main class="content">
      <div id="contractLink" class="contract-link" hidden>
        Exchange contract deployed on
        <a id="contractLinkUrl" href="#" target="_blank" rel="noreferrer"></a>
      </div>
      <section class="panel">
        <div class="panel-head" id="panelHead">
          <h2>Create Token Exchange Order</h2>
        </div>
        <div id="message" class="message" role="status"></div>

        <form id="orderForm" class="form">
          <label class="field">
            <span>Selling Token</span>
            <select id="fromToken" class="select" required></select>
          </label>
          <label class="field">
            <span>Receiving Token</span>
            <select id="toToken" class="select" required></select>
          </label>
          <div class="field">
            <span>Amounts</span>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <input id="amountA" type="number" min="0" step="0.0001" placeholder="Token A" required />
              <input id="amountB" type="number" min="0" step="0.0001" placeholder="Token B" required />
            </div>
          </div>
          <div class="field">
            <span>Order Duration</span>
            <div id="durationControls" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <label><input type="radio" name="durationType" value="relative" checked /> Hours/Days</label>
              <label><input type="radio" name="durationType" value="absolute" /> Date/Time</label>
            </div>
            <div id="durationInputs" style="margin-top:8px;">
              <input id="durationRelative" type="number" min="1" step="1" placeholder="Hours (e.g. 24)" />
              <input id="durationAbsolute" type="datetime-local" style="display:none;" />
            </div>
          </div>
          <div class="field">
            <span>Post On-Chain?</span>
            <div id="postOnChainControls" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <label><input type="radio" name="postOnChain" value="yes" checked /> Yes pls</label>
              <label><input type="radio" name="postOnChain" value="no" /> No thx</label>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn">Create</button>
          </div>
        </form>
      </section>
    </main>

    <div id="txModal" class="modal" hidden>
      <div class="modal-card">
        <div class="modal-head">
          <h3>Transaction Confirmed</h3>
          <button id="closeModal" class="btn ghost">Close</button>
        </div>
        <div id="txBody" class="modal-body"></div>
      </div>
    </div>

    <script type="module" src="static/app.js"></script>
  </body>
</html>
